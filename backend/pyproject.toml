[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  ".venv",
  "venv",
  "__pycache__",
  "dist",
  "build",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "fastapi>=0.135.1",
    "httpx>=0.28.1",
    "pydantic>=2.12.5",
    "pytest>=8.4.2",
    "pytest-cov>=7.0.0",
    "pyright>=1.1.408",
    "ruff>=0.14.0",
    "supabase>=2.18.1",
    "uvicorn[standard]>=0.41.0",
]
