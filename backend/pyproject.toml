[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  ".venv",
  "venv",
  "__pycache__",
  "dist",
  "build",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pydantic>=2.12.5",
    "pyright>=1.1.408",
]
